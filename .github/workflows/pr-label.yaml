name: pr-label

on:
  pull_request:

permissions: {}

jobs:
  size-label:
    runs-on: ubuntu-latest
    permissions: 
      pull-requests: write
    if: '!github.event.pull_request.head.repo.fork'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: size-label
        uses: "pascalgn/size-label-action@27a1fdd9e5a5b390573b16072bca0841a1cffce6"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

