name: pr-label

on:
  pull_request:

permissions: {}

jobs:
  size-label:
    runs-on: ubuntu-latest
    permissions: 
      pull-requests: write
    if: '!github.event.pull_request.head.repo.fork'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: size-label
        uses: "pascalgn/size-label-action@27a1fdd9e5a5b390573b16072bca0841a1cffce6"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

